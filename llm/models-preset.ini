; moka-1 LLM 編成 — llama-server router mode の preset(ADR00020、tenets §3.3)
; セクション名 = OpenAI 互換 API の model フィールドで指定するモデル名。
; キーは CLI 引数名のダッシュ抜き。優先順位: CLI 引数 > モデル別セクション > [*]
; 注意: セクション外のトップレベルにキーを書かない(b9859 では "default" という
; 空モデルとして誤登録される — スパイク実測 2026-07-19)
[*]
ngl = 99
c = 8192

; 高速パス: 要約・タグ抽出・翻訳(ADR00007)。thinking は preset 側で無効化
[qwen3.5-4b]
hf = unsloth/Qwen3.5-4B-GGUF:Q4_K_M
jinja = true
chat-template-kwargs = {"enable_thinking": false}
load-on-startup = true

; Embedding: pgvector 1024次元(ADR00008)。クエリ側 prefix は moka-core internal/llm が付ける
[qwen3-embedding-0.6b]
hf = Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0
embedding = true
pooling = last
ub = 8192
b = 8192
load-on-startup = true

; 集約層: 提案の審査・統合、RAG Q&A の最終回答(ADR00007)
[gpt-oss-20b]
hf = ggml-org/gpt-oss-20b-GGUF
load-on-startup = true

; 交代枠(Qwen3.6-35B-A3B)は M3 で追加予定 — load-on-startup = false で LRU 任せにする
