# moka-1 — `docker compose up -d --wait` 一発で全部が上がる(tenets §2-1)
# 常駐サービス = 5: plecto / moka-core / moka-web / db / llm(tenets §2-3)
# migrate / plecto-certs-init / plecto-filters-build / plecto-manifest-render は
# one-shot ジョブ(ADR00001)で常駐上限には数えない
name: moka

services:
  # 開発用 TLS 証明書を named volume に生成する one-shot ジョブ(ADR見直し版)。
  # 公式 Plecto イメージは distroless(シェル/openssl 無し)なので、以前の entrypoint.sh 方式
  # (コンテナ起動時に自己署名生成)がそのままでは動かず、migrate と同じ「別コンテナで先に済ませる」
  # 形に切り出した。生成済みならスキップ(冪等)。本物の証明書に差し替える場合は同じ named volume の
  # 同じパス(certs/moka.crt, certs/moka.key)に置けばこのジョブは何もしない。
  # chown は毎回実行する(存在チェックで早期 return しても所有権だけは合わせる) — plecto コンテナは
  # distroless nonroot(uid 65532)で読むので、root で生成したファイルのままだと Permission denied
  plecto-certs-init:
    image: alpine:3.22
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if [ -s /certs/moka.crt ] && [ -s /certs/moka.key ]; then
          echo "plecto dev certificate already present, skipping generation" >&2
        else
          apk add --no-cache openssl >/dev/null
          echo "generating self-signed dev certificate in /certs" >&2
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -nodes \
            -keyout /certs/moka.key -out /certs/moka.crt \
            -days 825 -subj "/CN=moka.localhost" \
            -addext "subjectAltName=DNS:moka.localhost,DNS:localhost,IP:127.0.0.1"
        fi
        chown 65532:65532 /certs/moka.crt /certs/moka.key
        chmod 0644 /certs/moka.crt
        chmod 0600 /certs/moka.key
    volumes:
      - plecto-certs:/certs
    restart: "no"

  # WASM フィルタ 2 枚(session-auth / ratelimit)をビルド → component 化 → 署名 →
  # OCI image-layout 生成まで行う one-shot ジョブ(Phase 2、tenets §3.5)。
  # Plecto は bare .wasm をロードしない(署名済み OCI layout + digest pin + [trust] が必須、
  # fail-closed)ため、パッケージングまでがビルドの仕事。手順本体は plecto/build/filters-build.sh。
  # cargo レジストリ / target / wasm-tools は named volume にキャッシュし 2 回目以降を高速化。
  # フィルタのソースを変えたら: docker compose run --rm plecto-filters-build
  #                       → docker compose run --rm plecto-manifest-render
  #                       → docker compose kill -s HUP plecto
  plecto-filters-build:
    image: rust:1.96.1-trixie@sha256:1f0dbad1df66647807e6952d1db85d0b2bda7606cb2139d82517e4f009967376 # Plecto 本体の rust-toolchain.toml(1.96.0 系)に合わせて pin
    entrypoint: ["/bin/bash", "/job/filters-build.sh"]
    volumes:
      - ./plecto/build:/job:ro
      - ./plecto/filters:/src:ro
      - plecto-build-cache:/cache
      - plecto-runtime:/out
    secrets:
      - plecto_filter_signing_key
    restart: "no"

  # manifest テンプレートに Docker secret(session_hmac_key)とビルド済みフィルタの digest を
  # 埋めて、plecto が読む完成 manifest を plecto-runtime volume にレンダリングする one-shot
  # ジョブ。Plecto の [filter.config] にはファイル間接参照・env 展開が無く(インライン文字列
  # のみ)、ファイルベース secrets(ADR00003)とはここで橋渡しする。手順本体は
  # plecto/build/manifest-render.sh。テンプレート編集後は run --rm でこのジョブを再実行 → HUP
  plecto-manifest-render:
    image: alpine:3.22
    entrypoint: ["/bin/sh", "/job/manifest-render.sh"]
    volumes:
      - ./plecto/build:/job:ro
      - ./plecto/manifest.tmpl.toml:/in/manifest.tmpl.toml:ro
      - plecto-runtime:/out
    secrets:
      - session_hmac_key
    depends_on:
      plecto-filters-build:
        condition: service_completed_successfully
    restart: "no"

  # エッジ: TLS 終端、HTTP/1·2·3、ルーティング + WASM フィルタ(Phase 2: セッション認証 +
  # レート制限 — plecto/manifest.tmpl.toml)。設定一式(manifest / filters / keys)は
  # plecto-runtime volume に one-shot ジョブ群が組み立てたものを ro で読む。
  # upstream が落ちていても 503 で立ち続けるので upstream への depends_on は張らない(エッジは独立)。
  # 公式イメージ(ghcr.io/kaikei-e/plecto)固定 — ADR00005 の Revisit Trigger(公式イメージ配布)
  # が発火したためソースビルドから移行。タグは可変なので digest も併記して pin する。
  plecto:
    image: ghcr.io/kaikei-e/plecto:0.4.2@sha256:979994aa6530cb31f95dad493f53b3a80151632861f2bedafe8b014091e3fbbe
    command: ["/run/plecto/manifest.toml"] # bind アドレスは manifest の [listen] 側(CLI引数は渡さない)
    restart: unless-stopped
    ports:
      - "443:443/tcp" # HTTP/1.1 + HTTP/2 (TLS)
      - "443:443/udp" # HTTP/3 (QUIC)
      - "127.0.0.1:9099:9099" # admin (/metrics /healthz /readyz) — ホストローカルのみ
    volumes:
      # レンダリング済み manifest + 署名済みフィルタ + trust 公開鍵(one-shot ジョブ群が生成)
      - plecto-runtime:/run/plecto:ro
      # 自己署名証明書(plecto-certs-init が生成)。mountpoint の certs/ ディレクトリは
      # plecto-manifest-render が volume 内に掘っておく(ro マウント内 mkdir 失敗の罠対策)
      - plecto-certs:/run/plecto/certs
    depends_on:
      plecto-certs-init:
        condition: service_completed_successfully
      plecto-manifest-render:
        condition: service_completed_successfully
    # healthcheck 無し: 公式イメージは distroless で curl もシェルも無く、plecto CLI にも
    # moka-core の `moka healthz` に相当する自己プローブ用サブコマンドが無い(validate/schema/
    # --version のみ)。Plecto 側に issue 起票予定。手動確認は README の運用コマンド参照

  # API + 常駐エージェントループ(Go 単一バイナリ)
  moka-core:
    build: ./core
    restart: unless-stopped
    environment:
      # パスワードは secret から(store 層が POSTGRES_PASSWORD_FILE を読んで DSN に合成する契約)
      DATABASE_URL: postgres://moka@db:5432/moka?sslmode=disable
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      LLM_BASE_URL: http://llm:8081/v1
      # セッション署名鍵(ADR00021)。Plecto の session-auth フィルタと同じ鍵を共有
      # (鍵バイト列 = ファイル内容 trim 後の UTF-8、hex デコードしない)。
      # 未配線でも auth エンドポイントが 503 になるだけで他は動く(フェイルソフト)
      SESSION_HMAC_KEY_FILE: /run/secrets/session_hmac_key
      # WEBAUTHN_RP_ID / WEBAUTHN_ORIGIN(既定 localhost / https://localhost)。
      # 実ドメイン公開時は .env(gitignore 済み)で上書き必須 — ここにドメインを書かない
      # (登録後の変更は既存パスキーを無効化する)。未設定時の既定値は internal/auth 側で解決
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
    secrets:
      - postgres_password
      - session_hmac_key
    depends_on:
      db:
        condition: service_healthy
        restart: true
      migrate:
        condition: service_completed_successfully
      # llm は入れない — fail-soft: LLM が死んでも RSS リーダーとしては動く(tenets §2-6)
    healthcheck:
      test: ["CMD", "/moka", "healthz"] # distroless に curl は無い
      interval: 30s
      start_period: 30s
      start_interval: 2s
    develop:
      watch:
        - action: rebuild
          path: ./core
          ignore:
            - "**/*_test.go"

  # 読むための UI(SvelteKit SSR / adapter-node)
  moka-web:
    build: ./web
    restart: unless-stopped
    environment:
      MOKA_CORE_URL: http://moka-core:8080 # moka-core へはサーバー側から(bp-svelte §11)
      # form actions の origin 検査用(SvelteKit の CSRF 保護)。既定 https://localhost。
      # 実ドメイン公開時は .env(gitignore 済み)で上書き必須 — ここにドメインを書かない。
      # 未上書きだと本番ドメインからの POST が全部 403(Cross-site POST forbidden)になる
      ORIGIN: ${ORIGIN:-https://localhost}
    depends_on:
      moka-core:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      start_period: 30s
      start_interval: 2s
    develop:
      watch:
        - action: rebuild
          path: ./web/src

  # 記事、フィード、埋め込み、ジョブ状態、すべてここ(単一 DB — tenets §2-4)
  db:
    image: pgvector/pgvector:0.8.4-pg18-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: moka
      POSTGRES_DB: moka
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "127.0.0.1:5432:5432" # atlas migrate diff / psql デバッグ用
    volumes:
      - db-data:/var/lib/postgresql # PG18 イメージは data ではなくここが volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moka -d moka"]
      interval: 30s
      start_period: 30s
      start_interval: 2s

  # one-shot: Atlas マイグレーション適用(ADR00001)。実行後 exit 0
  migrate:
    image: arigaio/atlas:1.2.3-community-alpine # secret をコマンドに合成するため sh 入りの alpine 変種
    entrypoint: ["/bin/sh", "-c"]
    # sh -c に 1 引数で渡すためリスト形式必須(文字列だと compose が分割する)。
    # $$ は compose の変数展開エスケープ(コンテナ内の sh が評価する)
    command:
      - 'atlas migrate apply --url "postgres://moka:$$(cat /run/secrets/postgres_password)@db:5432/moka?sslmode=disable" --dir file:///migrations'
    secrets:
      - postgres_password
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ローカル推論(Vulkan 固定 — gfx1150 は ROCm 非対応、tenets §3.3)
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9859 # pin。更新は eval/ の速度実測とセットで
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri # iGPU パススルー
    group_add:
      - video
      - "992" # render(コンテナ /etc/group に render が無いのでホストの GID 数値で。getent group render)
    environment:
      LLAMA_CACHE: /models # preset の hf キーの自動 DL 先を bind mount へ
    # router mode(ADR00020): モデル編成は llm/models-preset.ini が単一ソース
    # (高速パス Qwen3.5-4B / Embedding Qwen3-Embedding-0.6B / 集約層 gpt-oss-20B の3枚常駐)。
    # --models-max 3 超過時は LRU 退避 — 小さいGPUでも縮退して動く(OSS利用者への配慮)
    command: >-
      --models-preset /models-preset.ini --models-max 3
      --host 0.0.0.0 --port 8081
    ports:
      - "127.0.0.1:8081:8081" # eval/ とデバッグ用
    volumes:
      - ./models:/models
      - ./llm/models-preset.ini:/models-preset.ini:ro
    healthcheck:
      # router mode の /health は「router 生存」のみ即 200 を返す(モデルDL/ロードは背景で進む)。
      # これにより --wait がモデルDLでブロックされる問題(旧・未決事項)は解消。
      # モデル別の状態は GET /models の status で見る
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      start_period: 2m
      start_interval: 5s

volumes:
  plecto-certs:
  plecto-runtime: # レンダリング済み manifest + 署名済みフィルタ一式(one-shot ジョブ群が組み立て)
  plecto-build-cache: # cargo registry / target / wasm-tools のキャッシュ(2回目以降のビルド高速化)
  db-data:

# 機微情報はファイルベース secret で渡す(環境変数直書き禁止)。
# 初回のみ: secrets/README.md の手順で postgres_password.txt / session_hmac_key.txt /
# plecto_filter_signing_key.pem を作る(いずれも gitignore 済み)
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  # セッション署名 cookie の共有シークレット(ADR00021)。moka-core(cookie 発行)と
  # plecto の session-auth フィルタ(検証、plecto-manifest-render 経由)が同じ値を読む
  session_hmac_key:
    file: ./secrets/session_hmac_key.txt
  # WASM フィルタの dev 署名鍵(ECDSA P-256)。公開鍵は plecto-filters-build が導出して
  # manifest の [trust] へ。Phase 4(OCI 配布 + cosign 署名)で本番署名系に置き換える予定
  plecto_filter_signing_key:
    file: ./secrets/plecto_filter_signing_key.pem
