name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # どのモジュールが変わったかを見て、以降のジョブを間引く(paths-filter はジョブ単位の if
  # ゲートなので skip は success 扱いになり、必須チェックが Pending のまま止まる罠を踏まない)
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      web: ${{ steps.filter.outputs.web }}
      eval: ${{ steps.filter.outputs.eval }}
      db: ${{ steps.filter.outputs.db }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            eval:
              - 'eval/**'
              - '.github/workflows/ci.yml'
            db:
              - 'db/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'core/**'
              - 'web/**'
              - 'db/**'
              - 'e2e/**'
              - 'compose.yaml'
              - 'compose.e2e.yaml'
              - '.github/workflows/ci.yml'

  # ローカル CI パリティ(CLAUDE.md): gofmt / go vet / go fix / golangci-lint / go test
  core:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum
      - name: gofmt
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "::error::gofmt に差分があります。'cd core && gofmt -w .' を実行してください"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go fix (適用済みであることを確認)
        run: |
          go fix ./...
          git diff --exit-code
      - name: golangci-lint (v2)
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: v2.12.2
          working-directory: core
          args: --timeout=5m
      - name: go test
        run: go test ./...

  # pnpm lint(prettier+eslint) / svelte-check / vitest
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check
      - run: pnpm test

  # ruff format/check + pyrefly + pytest(eval/ はモデル選定用ハーネス、低優先だが CI パリティは揃える)
  eval:
    needs: changes
    if: needs.changes.outputs.eval == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            eval/pyproject.toml
            eval/uv.lock
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyrefly check .
      - run: uv run pytest

  # atlas migrate lint(このブランチで追加された migration のみ) + schema.sql との drift 検査
  db:
    needs: changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db
    env:
      # atlas.hcl の env "local" は url 属性が必須(getenv 参照)。migrate lint/diff はどちらも
      # dev-database(docker+postgres URL)だけで完結し url は使わないが、HCL 評価用にダミー値を渡す
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci_unused?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # migrate lint --git-base に比較先ブランチの履歴が要る
      - name: install atlas (community, compose の migrate ジョブと同じ 1.2.3 に固定)
        run: curl -fsSL https://atlasgo.sh | ATLAS_VERSION=v1.2.3 sh -s -- --community -y
      - name: atlas migrate lint
        # ローカル手順(CLAUDE.md)は --latest 1 だが、CI では PR で複数 migration が
        # 追加され得るのでベースブランチとの差分全体を見る --git-base の方が正しい
        run: atlas migrate lint --env local --git-base "origin/${{ github.event.repository.default_branch }}"
      - name: atlas migrate diff drift check
        # schema.sql を変更したのに migration を生成し忘れていないかを検査
        run: |
          atlas migrate diff ci_drift_check --env local
          if [ -n "$(git status --porcelain migrations)" ]; then
            echo "::error::schema.sql の変更に対応する migration が生成されていません。'cd db && atlas migrate diff <name> --env local' を実行してコミットしてください"
            git status --porcelain migrations
            git diff migrations
            exit 1
          fi

  # E2E(Hurl・API層)。Playwright とは別のフレッシュ DB で走らせる(e2e/README.md)。
  # CI ランナーは1ジョブ=使い捨て VM なので down -v で後始末してよい(ローカル手順の本番 db-data 保護は不要)
  e2e-hurl:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: E2E 用の使い捨て postgres secret を用意
        run: |
          mkdir -p secrets
          openssl rand -base64 24 | tr -d '/+=' > secrets/postgres_password.txt
      - name: install hurl (ローカル開発環境と同じ 8.0.1 に固定)
        run: |
          curl -fsSL -o /tmp/hurl.deb https://github.com/Orange-OpenSource/hurl/releases/download/8.0.1/hurl_8.0.1_amd64.deb
          sudo dpkg -i /tmp/hurl.deb
      - name: docker compose up (moka-core + e2e-fixtures)
        run: docker compose -f compose.yaml -f compose.e2e.yaml up -d --build --wait --wait-timeout 180 moka-core e2e-fixtures
      - name: hurl
        run: |
          mkdir -p e2e/hurl/reports
          hurl --test --jobs 1 --report-junit e2e/hurl/reports/junit.xml \
            --variable host=http://localhost:8080 \
            --variable fixture_url=http://e2e-fixtures/feed.xml \
            e2e/hurl/core/feeds_and_articles.hurl
      - name: dump compose logs
        if: always()
        run: docker compose -f compose.yaml -f compose.e2e.yaml logs --no-color > compose-logs-hurl.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-hurl-results
          path: |
            e2e/hurl/reports/
            compose-logs-hurl.txt
      - name: docker compose down
        if: always()
        run: docker compose -f compose.yaml -f compose.e2e.yaml down -v

  # E2E(Playwright・UI層)。Hurl とは別ジョブ = 別ランナー = 別フレッシュ DB(e2e/README.md の前提を満たす)
  e2e-playwright:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: E2E 用の使い捨て postgres secret を用意
        run: |
          mkdir -p secrets
          openssl rand -base64 24 | tr -d '/+=' > secrets/postgres_password.txt
      - uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: web
      - name: docker compose up (moka-core + moka-web + e2e-fixtures)
        run: docker compose -f compose.yaml -f compose.e2e.yaml up -d --build --wait --wait-timeout 180 moka-core moka-web e2e-fixtures
      - name: playwright
        working-directory: web
        run: pnpm test:e2e
      - name: dump compose logs
        if: always()
        run: docker compose -f compose.yaml -f compose.e2e.yaml logs --no-color > compose-logs-playwright.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: e2e-playwright-results
          path: |
            web/playwright-report/
            web/test-results/
            compose-logs-playwright.txt
      - name: docker compose down
        if: always()
        run: docker compose -f compose.yaml -f compose.e2e.yaml down -v

  # 唯一の必須ステータスチェックにする想定のゲート。skip は許容し、failure/cancelled だけで落とす
  ci:
    name: CI
    if: always()
    needs: [core, web, eval, db, e2e-hurl, e2e-playwright]
    runs-on: ubuntu-latest
    steps:
      - name: すべてのジョブが green(または変更なしで skip)であることを確認
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::いずれかの必須ジョブが失敗、またはキャンセルされました"
            exit 1
          fi
