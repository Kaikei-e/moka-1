# moka-1 エッジ manifest — Plecto ドッグフーディング Phase 1(tenets §3.5)
# TLS 終端 + path ルーティングのみの素通し。WASM フィルタ(認証・レート制限)は Phase 2 から。
# パスはすべて manifest 相対。コンテナ内では ./plecto が /run/plecto に ro マウントされ、
# certs/ だけ named volume が上書きされる(entrypoint.sh が生成)。
# 編集後は `docker compose kill -s HUP plecto` でゼロダウンタイム反映(壊れた編集は fail-closed で無視される)。

[observability]
# /metrics /healthz /readyz — compose 側で 127.0.0.1 のみに公開
admin_addr = "0.0.0.0:9099"
access_log = true

# 開発用自己署名証明書。[[tls]] が 1 枚でもあると同一ポートで HTTP/1.1・HTTP/2(TCP)+ HTTP/3(QUIC/UDP)が有効になる
[[tls]]
cert_path = "certs/moka.crt"
key_path = "certs/moka.key"

# ---- upstreams(アドレスは compose のサービス名。upstream へは平文 HTTP/1.1)----
# 契約: 各サービスは GET /healthz に 200 を返すこと。インスタンスは unhealthy から始まり、
# プローブが通るまでルーティングに入らない(Plecto ADR 000017)。
# moka-core / moka-web が未実装の間は 503 を返すのが正常(エッジは単独で立つ)。

[[upstream]]
name = "moka-core"
addresses = ["moka-core:8080"]
[upstream.health]
path = "/healthz"

[[upstream]]
name = "moka-web"
addresses = ["moka-web:3000"]
[upstream.health]
path = "/healthz"

# ---- routes(filters 空 = 素通し。最長 path_prefix が勝つ)----

# API は moka-core へ。/api prefix は strip しない(moka-core 側が /api/... で受ける契約)
[[route]]
upstream = "moka-core"
[route.match]
path_prefix = "/api"

# それ以外はすべて UI(SvelteKit SSR)へ
[[route]]
upstream = "moka-web"
[route.match]
path_prefix = "/"
